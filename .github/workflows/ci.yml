name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: ['22', '24']

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: claude-code-boss/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: claude-code-boss

      - name: Quality gate (eslint + version sync + tests)
        run: npm run gate
        working-directory: claude-code-boss