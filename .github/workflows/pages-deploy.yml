name: Deploy Pages

# Publica pages/ no GitHub Pages via Actions. Roda quando as páginas mudam
# (após o merge na main) e pode ser disparado manualmente. Independente do
# pages-guard: o guard barra páginas desatualizadas; este só publica.

on:
  push:
    branches: [main]
    paths:
      - 'pages/**'
      - '.github/workflows/pages-deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
