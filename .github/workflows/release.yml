name: Release Plugin

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Extract version from tag
        id: version
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Package plugin
        run: |
          cd claude-code-boss
          zip -r ../claude-code-boss-${{ steps.version.outputs.version }}.zip . \
            --exclude "node_modules/*" \
            --exclude ".git/*" \
            --exclude "*.log" \
            --exclude "*.download" \
            --exclude "output-styles/*"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3.0.0
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "v${{ steps.version.outputs.version }}"
          body: |
            ## claude-code-boss v${{ steps.version.outputs.version }}

            ### Instalação
            Baixe o ZIP e extraia em `~/.claude/plugins/` ou use o marketplace do Claude Code.

            ### Atualização
            O plugin verifica atualizações automaticamente (intervalo: 24h).
            Se houver update disponível, você será notificado no terminal.
          files: |
            claude-code-boss-${{ steps.version.outputs.version }}.zip
          draft: false
          prerelease: false
