name: Release Plugin

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Extract version from tag
        id: version
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Update plugin-version.json and package.json
        run: |
          VERSION=${{ steps.version.outputs.version }}
          TODAY=$(date +%Y-%m-%d)
          REPO="${{ github.repository }}"

          node -e "
            const fs = require('fs');
            const f = './claude-code-boss/scripts/plugin-version.json';
            const d = JSON.parse(fs.readFileSync(f, 'utf-8'));
            d.version = '$VERSION';
            d.releaseDate = '$TODAY';
            d.releaseUrl = 'https://github.com/$REPO/releases/latest';
            d.apiUrl = 'https://api.github.com/repos/$REPO/releases/latest';
            fs.writeFileSync(f, JSON.stringify(d, null, 2) + '\n');
          "
          node -e "
            const fs = require('fs');
            const f = './claude-code-boss/package.json';
            const d = JSON.parse(fs.readFileSync(f, 'utf-8'));
            d.version = '$VERSION';
            fs.writeFileSync(f, JSON.stringify(d, null, 2) + '\n');
          "

      - name: Package plugin
        run: |
          cd claude-code-boss
          zip -r ../claude-code-boss-${{ steps.version.outputs.version }}.zip . \
            --exclude "node_modules/*" \
            --exclude ".git/*" \
            --exclude "*.log" \
            --exclude "*.download" \
            --exclude "output-styles/*"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "v${{ steps.version.outputs.version }}"
          body: |
            ## claude-code-boss v${{ steps.version.outputs.version }}

            ### Instalação
            Baixe o ZIP e extraia em `~/.claude/plugins/` ou use o marketplace do Claude Code.

            ### Atualização
            O plugin verifica atualizações automaticamente (intervalo: 24h).
            Se houver update disponível, você será notificado no terminal.
          files: |
            claude-code-boss-${{ steps.version.outputs.version }}.zip
          draft: false
          prerelease: false
