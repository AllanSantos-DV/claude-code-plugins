name: Release Plugin

on:
  push:
    tags:
      - 'v*'
      - 'rf-v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Resolve plugin + version from tag
        id: meta
        run: |
          TAG="${{ github.ref_name }}"
          if [[ "$TAG" == rf-v* ]]; then
            echo "plugin=rf-reviewer" >> $GITHUB_OUTPUT
            echo "dir=rf-reviewer" >> $GITHUB_OUTPUT
            echo "version=${TAG#rf-v}" >> $GITHUB_OUTPUT
            echo "zip=rf-reviewer-${TAG#rf-v}.zip" >> $GITHUB_OUTPUT
          else
            echo "plugin=claude-code-boss" >> $GITHUB_OUTPUT
            echo "dir=claude-code-boss" >> $GITHUB_OUTPUT
            echo "version=${TAG#v}" >> $GITHUB_OUTPUT
            echo "zip=claude-code-boss-${TAG#v}.zip" >> $GITHUB_OUTPUT
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Package plugin
        run: |
          cd "${{ steps.meta.outputs.dir }}"
          zip -r "../${{ steps.meta.outputs.zip }}" . \
            --exclude "node_modules/*" \
            --exclude ".git/*" \
            --exclude "*.log" \
            --exclude "*.download" \
            --exclude "output-styles/*" \
            --exclude "**/__pycache__/*" \
            --exclude "**/.venv/*"
          cd ..
          sha256sum "${{ steps.meta.outputs.zip }}" | awk '{print $1}' > "${{ steps.meta.outputs.zip }}.sha256"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3.0.0
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: "${{ steps.meta.outputs.plugin }} v${{ steps.meta.outputs.version }}"
          body: |
            ## ${{ steps.meta.outputs.plugin }} v${{ steps.meta.outputs.version }}

            ### Instalação (marketplace)
            ```
            /plugin marketplace add AllanSantos-DV/claude-code-plugins
            /plugin install ${{ steps.meta.outputs.plugin }}@allansantos-plugins
            ```

            Ou baixe o ZIP e extraia em `~/.claude/plugins/`.

            O `.sha256` ao lado do ZIP permite ao auto-updater verificar a
            integridade do download antes de extrair/instalar.
          files: |
            ${{ steps.meta.outputs.zip }}
            ${{ steps.meta.outputs.zip }}.sha256
          draft: false
          prerelease: false

